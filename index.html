<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Exercise Tracker">
<title>Exercise Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#09090B;--black2:#111113;--black3:#1A1A1D;--black4:#222226;
    --gold:#C9A84C;--gold-light:#E2C47A;--gold-dim:#8A6A28;--gold-bg:#1A1400;
    --pearl:#F0EDE6;--pearl-dim:#B8B4AC;--pearl-muted:#6B6860;
    --green:#4ADE80;--green-bg:#052010;--green-bd:#166534;
    --red:#F87171;--red-bg:#1A0505;--red-bd:#7F1D1D;
    --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{background:var(--black);color:var(--pearl);font-family:'Barlow',system-ui,sans-serif;min-height:100vh;padding-bottom:calc(var(--safe-bot) + 24px);text-transform:uppercase;}
  .no-upper{text-transform:none !important;}
  #status-bar{background:var(--black);border-bottom:1px solid #2A2000;padding:calc(var(--safe-top) + 10px) 12px 0;}
  #header-title-row{padding-bottom:8px;}
  #toast{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%) translateY(-30px);background:var(--gold);color:var(--black);padding:10px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 24px #0009;transition:transform .3s ease,opacity .3s ease;white-space:nowrap;letter-spacing:.04em;opacity:0;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .nav-tabs{display:flex;gap:6px;width:100%;padding-bottom:10px;}
  .nav-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid #2A2000;cursor:pointer;font-size:13px;font-weight:700;font-family:'Barlow',sans-serif;transition:all .15s;letter-spacing:.03em;text-transform:uppercase;text-align:center;touch-action:manipulation;}
  .nav-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}
  .nav-btn.inactive{background:transparent;color:var(--gold-dim);}
  #day-tabs-wrap{background:var(--black);border-bottom:1px solid #2A2000;padding:8px 12px;position:sticky;top:0;z-index:9;}
  .day-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:8px 18px;border-radius:20px;cursor:pointer;border:1px solid #2A2000;background:transparent;transition:all .15s;touch-action:manipulation;}
  .day-tab.active{border-color:var(--gold);background:var(--gold-bg);}
  .day-tab-name{font-size:15px;font-weight:700;color:var(--gold-dim);font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;}
  .day-tab.active .day-tab-name{color:var(--gold);}
  .progress-bar-bg{margin-top:4px;height:2px;border-radius:2px;background:#2A2000;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}
  #main{padding:14px 12px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .section-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--pearl);letter-spacing:.04em;}
  .set-count{font-size:14px;color:var(--gold-dim);font-weight:600;}
  .date-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:var(--black2);border:1px solid #2A2000;border-radius:10px;padding:10px 14px;}
  .date-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
  .date-input{flex:1;background:transparent;border:none;color:var(--pearl);font-size:16px;font-weight:600;font-family:'Barlow',sans-serif;outline:none;cursor:pointer;}
  .date-input::-webkit-calendar-picker-indicator{filter:invert(.7) sepia(1) hue-rotate(10deg) saturate(2);cursor:pointer;}
  .sheets-status{font-size:13px;font-family:'Barlow',sans-serif;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .sheets-status.loading{color:var(--gold-dim);}
  .sheets-status.loaded{color:var(--pearl);}
  /* Cards */
  .ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .ex-card{background:var(--gold);border-radius:14px;padding:12px 10px 10px;cursor:pointer;transition:transform .12s,opacity .15s;position:relative;min-height:0;display:flex;flex-direction:column;justify-content:space-between;border:2px solid transparent;height:100%;touch-action:manipulation;}
  .ex-card.done{background:#F0EDE6;border-color:rgba(0,0,0,.15);}
  .ex-card.dragging{opacity:.35;}
  .ex-card.drag-over{border-color:var(--black);border-style:dashed;background:var(--gold-light);}
  .ex-card:active{transform:scale(.97);}
  .ex-card-drag{position:absolute;top:8px;right:8px;display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:4px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
  .ex-card-drag span{width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.35);display:block;}
  .ex-card.done .ex-card-drag span{background:rgba(0,0,0,.25);}
  .ex-card-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--black);line-height:1.2;padding-right:18px;}
  .ex-card-cat{font-size:10px;font-weight:700;color:rgba(0,0,0,.45);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;margin-bottom:2px;}
  .ex-card.done .ex-card-cat{color:rgba(0,0,0,.4);}
  .ex-card-rec{font-size:14px;font-weight:800;color:rgba(0,0,0,.85);letter-spacing:.01em;}
  .ex-card.done .ex-card-rec{color:rgba(0,0,0,.5);}
  .ex-card-done-dot{width:8px;height:8px;border-radius:50%;background:var(--black);position:absolute;top:10px;left:10px;}
  .ex-card-top-section{margin-bottom:8px;}
  .ex-card-sets-list{display:flex;flex-direction:column;gap:4px;border-top:1px solid rgba(0,0,0,.12);padding-top:8px;margin-top:auto;}
  .ex-set-row{display:flex;align-items:center;gap:5px;}
  .ex-set-num{font-size:11px;font-weight:700;color:rgba(0,0,0,.35);width:34px;flex-shrink:0;font-family:'Barlow',sans-serif;}
  .ex-card.done .ex-set-num{color:rgba(0,0,0,.3);}
  .ex-set-val{font-size:12px;font-weight:600;color:rgba(0,0,0,.5);font-family:'Barlow',sans-serif;}
  .ex-set-val.done-val{font-weight:800;color:var(--black);font-size:12px;}
  .ex-card.done .ex-set-val.done-val{color:var(--black);font-weight:800;}
  /* Modals */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-box{background:var(--black2);border:1px solid #2A2000;border-radius:20px;padding:20px 20px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;position:relative;}
  .modal-handle{width:44px;height:5px;background:#3A3000;border-radius:3px;margin:0 auto 18px;cursor:pointer;}
  .modal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--pearl);margin-bottom:2px;letter-spacing:.04em;}
  .modal-subtitle{font-size:13px;color:var(--gold-dim);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;}
  .modal-rec{display:inline-flex;align-items:center;gap:6px;background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--gold);font-weight:700;margin-bottom:14px;}
  .modal-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block;}
  .modal-input{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:12px 14px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;margin-bottom:12px;font-family:'Barlow',sans-serif;-webkit-appearance:none;}
  .modal-input:focus{border-color:var(--gold);}
  .modal-select{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:12px 14px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;margin-bottom:16px;font-family:'Barlow',sans-serif;appearance:none;-webkit-appearance:none;}
  .modal-select:focus{border-color:var(--gold);}
  .sets-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
  .sets-tbl th{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:0 4px 10px;text-align:left;}
  .sets-tbl th:last-child{text-align:center;}
  .sets-tbl td{padding:5px 4px;vertical-align:middle;}
  .set-num-td{font-size:15px;font-weight:700;color:var(--gold-dim);text-align:center;width:32px;}
  .done-row .set-num-td{color:var(--gold);}
  .set-inp-td input{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:11px 10px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;font-family:'Barlow',sans-serif;-webkit-appearance:none;}
  .set-inp-td input:focus{border-color:var(--gold);}
  .done-row .set-inp-td input{background:var(--gold-bg);border-color:var(--gold-dim);}
  .chk-td{text-align:center;width:40px;}
  .chk-btn{width:36px;height:36px;border-radius:9px;border:1px solid #2A2000;cursor:pointer;background:var(--black3);color:var(--pearl-muted);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:auto;touch-action:manipulation;}
  .chk-btn.checked{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim);}
  .notes-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:6px;display:block;}
  .notes-inp{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:11px 14px;color:var(--pearl);font-size:16px;font-family:'Barlow',sans-serif;outline:none;resize:none;min-height:48px;-webkit-appearance:none;}
  .notes-inp:focus{border-color:var(--gold);}
  .cardio-row{display:flex;align-items:center;gap:12px;padding:12px 0;}
  .cardio-lbl{font-size:15px;color:var(--gold);font-weight:700;}
  .cardio-inp{background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:11px 12px;color:var(--pearl);font-size:16px;width:90px;outline:none;font-family:'Barlow',sans-serif;-webkit-appearance:none;}
  .cardio-inp:focus{border-color:var(--gold);}
  .modal-btns{display:flex;gap:8px;margin-top:20px;}
  .modal-btn-primary{flex:1;padding:15px;border-radius:10px;border:none;background:var(--gold);color:var(--black);font-size:16px;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;touch-action:manipulation;}
  .modal-btn-cancel{flex:1;padding:15px;border-radius:10px;border:1px solid #2A2000;background:transparent;color:var(--pearl-muted);font-size:16px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;touch-action:manipulation;}
  .modal-btn-danger{flex:1;padding:15px;border-radius:10px;border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-size:16px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;touch-action:manipulation;}
  /* Add/Rename exercise */
  .ex-search-inp{width:100%;background:var(--black3);border:1.5px solid var(--gold);border-radius:8px;padding:12px 14px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;font-family:'Barlow',sans-serif;-webkit-appearance:none;margin-bottom:10px;}
  .ex-search-inp:focus{border-color:var(--gold-light);}
  .ex-suggest-list{max-height:240px;overflow-y:auto;border:1px solid #2A2000;border-radius:8px;margin-bottom:12px;background:var(--black3);}
  .ex-suggest-section{font-size:10px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;padding:8px 14px 4px;background:var(--black4);}
  .ex-suggest-item{padding:11px 14px;font-size:14px;font-weight:600;color:var(--pearl);cursor:pointer;border-bottom:1px solid #2A2000;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation;}
  .ex-suggest-item:last-child{border-bottom:none;}
  .ex-suggest-item:active{background:var(--gold-bg);color:var(--gold);}
  .ex-suggest-pr{font-size:11px;font-weight:700;color:var(--gold-dim);}
  .ex-suggest-item.fuzzy-match .ex-suggest-pr{color:var(--gold);}
  .ex-manual-row{display:flex;gap:8px;margin-bottom:12px;}
  /* Delete set */
  .del-set-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid #2A2000;margin-bottom:8px;cursor:pointer;transition:all .15s;}
  .del-set-row.selected{border-color:var(--red-bd);background:var(--red-bg);}
  .del-set-chk{width:20px;height:20px;border-radius:5px;border:1px solid #3A3A3A;background:var(--black3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .del-set-row.selected .del-set-chk{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
  /* Buttons */
  .add-exercise-btn{width:100%;padding:15px;border-radius:12px;border:1.5px dashed #2A2000;background:transparent;color:var(--gold-dim);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:'Barlow',sans-serif;letter-spacing:.04em;touch-action:manipulation;}
  .save-session-btn{width:100%;padding:18px;border-radius:14px;border:none;background:var(--gold);color:var(--black);font-size:18px;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:.05em;touch-action:manipulation;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:14px;margin-top:8px;padding:10px 14px;border-radius:8px;font-weight:700;}
  .sync-status.syncing{background:var(--black2);color:var(--gold-dim);}
  .sync-status.success{background:var(--black2);color:var(--pearl);}
  .sync-status.error{background:var(--red-bg);color:var(--red);}
  /* Dashboard */
  .dash-card{background:var(--black2);border:1px solid #2A2000;border-radius:12px;padding:16px;margin-bottom:12px;}
  .dash-card-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:.04em;}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-box{background:var(--black3);border-radius:8px;padding:12px;}
  .stat-label{font-size:12px;color:var(--gold-dim);font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
  .stat-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-top:2px;color:var(--pearl);}
  /* Calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-nav-btn{background:var(--black3);border:1px solid #2A2000;color:var(--gold);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:700;touch-action:manipulation;}
  .cal-nav-label{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--pearl);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .cal-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.8vw,17px);font-weight:700;background:var(--black3);color:var(--pearl-muted);opacity:.45;font-family:'Barlow',sans-serif;}
  .cal-cell.has-session{background:var(--gold-bg);color:var(--gold);opacity:1;border:1px solid var(--gold-dim);cursor:pointer;touch-action:manipulation;}
  .cal-cell.empty{background:transparent;opacity:0;}
  .cal-cell.selected{outline:2px solid var(--gold);opacity:1;}
  .cal-dow{font-size:11px;color:var(--gold-dim);text-align:center;font-weight:700;letter-spacing:.05em;}
  /* PR Accordion */
  .pr-accordion{border:1px solid #2A2000;border-radius:10px;overflow:hidden;margin-bottom:8px;}
  .pr-accordion-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:var(--black3);touch-action:manipulation;}
  .pr-accordion-name{font-size:13px;font-weight:700;color:var(--pearl);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;}
  .pr-accordion-peak{font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;}
  .pr-accordion-arrow{font-size:10px;color:var(--gold-dim);margin-left:8px;transition:transform .2s;flex-shrink:0;}
  .pr-accordion-body{display:none;padding:10px 14px;background:var(--black2);border-top:1px solid #2A2000;}
  .pr-accordion-body.open{display:block;}
  .pr-hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1A1A1D;}
  .pr-hist-row:last-child{border-bottom:none;}
  /* Charts */
  .bar-chart-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .bar-label{font-size:11px;color:var(--pearl-muted);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:var(--black3);border-radius:4px;height:18px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .6s ease;}
  .bar-val{font-size:11px;font-weight:700;color:var(--pearl);width:32px;text-align:right;flex-shrink:0;}
  .vol-chart{width:100%;height:120px;}
  .donut-wrap{display:flex;align-items:center;gap:16px;}
  .donut-legend{display:flex;flex-direction:column;gap:6px;flex:1;}
  .donut-legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--pearl-muted);}
  .donut-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  /* History */
  .hist-wrap{background:var(--black2);border:1px solid #2A2000;border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .hist-head{padding:14px;border-bottom:1px solid #2A2000;display:flex;justify-content:space-between;align-items:center;}
  .hist-day{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--pearl);letter-spacing:.04em;}
  .hist-date{font-size:13px;color:var(--gold-dim);font-weight:600;}
  .hist-badge{font-size:12px;padding:3px 10px;border-radius:5px;font-weight:700;}
  .hist-badge.synced{background:var(--black3);color:var(--pearl);border:1px solid #3A3A3A;}
  .hist-badge.local{background:var(--black3);color:var(--pearl-muted);border:1px solid #2A2000;}
  .hist-tbl{width:100%;border-collapse:collapse;font-size:13px;}
  .hist-tbl th{font-size:11px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px;text-align:left;border-bottom:1px solid #2A2000;white-space:nowrap;}
  .hist-tbl td{padding:9px 10px;border-bottom:1px solid #111113;color:var(--pearl);vertical-align:middle;}
  .hist-tbl tr:last-child td{border-bottom:none;}
  .hist-tbl td.ex-name{font-weight:700;}
  .hist-tbl td.set-val{color:var(--pearl);font-weight:700;}
  .hist-tbl td.note-val{color:var(--pearl-muted);font-size:11px;}
  /* Export */
  .export-card{background:var(--black2);border:1px solid #2A2000;border-radius:12px;padding:16px;margin-bottom:12px;}
  .export-card-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px;}
  .export-card-desc{font-size:15px;color:var(--pearl-muted);margin-bottom:12px;line-height:1.6;}
  .export-btns{display:flex;gap:8px;}
  .export-btn-p{flex:1;padding:14px;border-radius:10px;border:none;background:var(--gold);color:var(--black);font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;touch-action:manipulation;}
  .export-btn-s{flex:1;padding:14px;border-radius:10px;border:1px solid #2A2000;background:transparent;color:var(--gold-dim);font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;touch-action:manipulation;}
  .danger-card{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:12px;padding:16px;}
  .danger-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--red);margin-bottom:4px;}
  .danger-btn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--red-bd);background:transparent;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Barlow',sans-serif;touch-action:manipulation;}
  .status-ok{font-size:15px;color:var(--pearl);}

// Fuzzy match: score how well query matches a name (0=no match, higher=better)
function fuzzyScore(query, target) {
  const q = query.toLowerCase().trim();
  const t = target.toLowerCase();
  if (!q) return 0;
  if (t === q) return 100;
  if (t.startsWith(q)) return 80;
  if (t.includes(q)) return 60;
  // Word-level match
  const qWords = q.split(/\s+/);
  const tWords = t.split(/\s+/);
  const matched = qWords.filter(w => w.length > 2 && tWords.some(tw => tw.includes(w) || w.includes(tw)));
  if (matched.length > 0) return 40 + matched.length * 10;
  // Character overlap
  let overlap = 0;
  for (const ch of q) { if (t.includes(ch)) overlap++; }
  const score = Math.round((overlap / Math.max(q.length, t.length)) * 30);
  return score;
}

// Get categorized suggestions for a given day type, filtered by query, sorted by muscle relevance + PR
function getExerciseSuggestions(dayType, query, targetCat, existingNames) {
  const isLower = dayType.toLowerCase().includes("lower");
  const dayFilter = isLower ? "lower" : "upper";

  // Filter to correct day type (+ both)
  let pool = EXERCISE_DB.filter(e => e.day === dayFilter || e.day === "both");

  // Exclude already-in-plan exercises
  const existingLower = (existingNames||[]).map(n=>n.toLowerCase());
  pool = pool.filter(e => !existingLower.includes(e.name.toLowerCase()));

  // Score each entry
  pool = pool.map(e => {
    let score = fuzzyScore(query, e.name);
    // Boost same category
    if (targetCat && e.cat === targetCat) score += 20;
    // Boost same muscle group if we can infer from name
    return { ...e, score };
  });

  if (query && query.trim().length > 1) {
    // When typing, only show matches above threshold
    pool = pool.filter(e => e.score > 10);
    pool.sort((a,b) => b.score - a.score);
  } else {
    // No query: sort by category priority then name
    const catOrder = {"Primary Compound":0,"Secondary Compound":1,"Isolation":2,"Cardio Finisher":3,"Other":4};
    pool.sort((a,b) => (catOrder[a.cat]||4)-(catOrder[b.cat]||4) || a.name.localeCompare(b.name));
  }

  return pool;
}

// Infer category from exercise name using DB
function inferCategory(name) {
  const match = DB_BY_NAME[name.toLowerCase()];
  if (match) return match.cat;
  // Fallback keyword inference
  const n = name.toLowerCase();
  if (n.includes("squat")||n.includes("deadlift")||n.includes("press")&&(n.includes("bench")||n.includes("overhead"))) return "Primary Compound";
  if (n.includes("row")||n.includes("pulldown")||n.includes("pull-up")||n.includes("lunge")) return "Secondary Compound";
  if (n.includes("curl")||n.includes("fly")||n.includes("raise")||n.includes("extension")||n.includes("kickback")||n.includes("pullover")) return "Isolation";
  if (n.includes("walk")||n.includes("bike")||n.includes("cardio")||n.includes("treadmill")||n.includes("row")&&n.includes("machine")) return "Cardio Finisher";
  return "Isolation";
}

// Infer target reps from DB or category
function inferTargetReps(name, cat) {
  const match = DB_BY_NAME[name.toLowerCase()];
  if (match) return match.reps;
  if (cat === "Primary Compound") return "6–8";
  if (cat === "Secondary Compound") return "8–10";
  if (cat === "Cardio Finisher") return "15 mins";
  return "12–15";
}

function inferRest(name, cat) {
  const match = DB_BY_NAME[name.toLowerCase()];
  if (match) return match.rest;
  if (cat === "Primary Compound") return "2–3 mins";
  if (cat === "Secondary Compound") return "90s–2 mins";

  return "60–90s";
}

  return `${y}-${m}-${day}`;
}
function fmtDate(raw) {
  if (!raw || raw === "—") return "—";
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
    const [y,m,d] = raw.split("-");
    return new Date(+y,+m-1,+d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  }
  // Try parsing any other format, strip time
  const d = new Date(raw);
  if (!isNaN(d)) return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return raw;
}

// ── One-time migration: old 4-day structure (Upper 1/2, Lower 1/2) -> Upper/Lower
function migrateToTwoDayStructure() {
  const oldKeys = Object.keys(workoutPlan);
  const hasOldStructure = oldKeys.some(k => /^(Upper|Lower)\s*[12]$/.test(k));
  if (!hasOldStructure) return;

  const mergeGroup = (prefix) => {
    const seen = new Set();
    const merged = [];
    oldKeys.filter(k => k.startsWith(prefix)).forEach(k => {
      (workoutPlan[k].exercises||[]).forEach(ex => {
        const key = ex.name.toLowerCase();
        if (!seen.has(key)) { seen.add(key); merged.push(ex); }
      });
    });
    return merged;
  };

  const newPlan = {
    "Upper": { exercises: mergeGroup("Upper") },
    "Lower": { exercises: mergeGroup("Lower") }
  };
  // Fall back to defaults if a group ended up empty
  if (!newPlan.Upper.exercises.length) newPlan.Upper.exercises = JSON.parse(JSON.stringify(DEFAULT_PLAN.Upper.exercises));
  if (!newPlan.Lower.exercises.length) newPlan.Lower.exercises = JSON.parse(JSON.stringify(DEFAULT_PLAN.Lower.exercises));

  workoutPlan = newPlan;
  sessionData = {}; exerciseNames = {}; comments = {}; sessionDates = {};

  // Relabel history day values so Dashboard/History reflect the new structure

    if (/^Upper\s*[12]$/.test(h.day)) h.day = "Upper";
    else if (/^Lower\s*[12]$/.test(h.day)) h.day = "Lower";
  });

  persist();
}

    let data; try{data=JSON.parse(text);}catch(e){sheetsDebug="Parse error";sheetsLoading=false;render();return;}
    if (data.history) {
      sheetsHistory={};
      const nameSet=new Set();
      data.history.forEach(row=>{
        const name=(row.exercise||"").toLowerCase();
        const raw =row.exercise||"";
        const w=parseFloat(row.weight);
        if(name&&!isNaN(w)){if(!sheetsHistory[name]||w>sheetsHistory[name])sheetsHistory[name]=w;}
        if(raw) nameSet.add(raw);
      });
      sheetsExerciseNames=[...nameSet].sort();
      sheetsLoaded=true; sheetsDebug=""; persist();
    }
  } catch(e){sheetsDebug="Fetch failed: "+e.toString();}
  sheetsLoading=false; render();
}

function getLastWeight(exName) {
  for (const h of history) {
    const ex=h.exercises.find(e=>e.name.toLowerCase()===exName.toLowerCase());
    if(ex){const ws=ex.sets.filter(s=>s.done&&s.weight).map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w));if(ws.length>0)return Math.max(...ws);}
  }
  return sheetsHistory[exName.toLowerCase()]||null;
}

function median(arr) {
  const s=[...arr].sort((a,b)=>a-b);
  const mid=Math.floor(s.length/2);
  return s.length%2 ? s[mid] : (s[mid-1]+s[mid])/2;
}

// Parse "12–15" -> {floor:12,ceiling:15}; "6–8" -> {floor:6,ceiling:8}; unparseable (AMRAP, mins) -> null
function parseRepRange(rangeStr) {
  if (!rangeStr) return null;
  const m = String(rangeStr).match(/(\d+)\s*[–-]\s*(\d+)/);
  if (m) return { floor: parseInt(m[1]), ceiling: parseInt(m[2]) };
  const single = String(rangeStr).match(/^\s*(\d+)\s*$/);
  if (single) return { floor: parseInt(single[1]), ceiling: parseInt(single[1]) };
  return null;
}

// Pull up to maxSessions of completed-set history for this exercise, newest first
function getExerciseSessions(exName, maxSessions) {
  maxSessions = maxSessions || 3;
  const sessions = [];
  for (const h of history) {
    const ex = h.exercises.find(e => e.name.toLowerCase() === exName.toLowerCase());
    if (ex) {
      const doneSets = ex.sets.filter(s => s.done && s.weight!=="" && s.reps!=="" && !isNaN(parseFloat(s.weight)) && !isNaN(parseFloat(s.reps)));
      if (doneSets.length) sessions.push({ date: h.date||h.sheetTab, sets: doneSets });
    }
    if (sessions.length >= maxSessions) break;
  }
  return sessions;
}

// Weight-drop tolerance cost, scaled by category and drop size
function weightDropCredit(drop, category) {
  const isIsolation = category === "Isolation";
  if (isIsolation) {
    if (drop >= 5) return 1;
    if (drop >= 2.5) return 0.5;
    return 0;
  } else {
    if (drop >= 10) return 1;
    if (drop >= 5) return 0.5;
    return 0;
  }
}

// Detects a genuine shortfall pattern: two consecutive sets both landing
// 2-3 reps under the ceiling. Single-set or 1-rep misses don't qualify.
function hasConsecutiveShortfall(repsArr, ceiling) {
  for (let i = 0; i < repsArr.length - 1; i++) {
    const s1 = ceiling - repsArr[i];
    const s2 = ceiling - repsArr[i+1];
    if (s1 >= 2 && s1 <= 3 && s2 >= 2 && s2 <= 3) return true;
  }
  return false;
}

// Full double-progression recommendation engine.
// Returns { weight, action:'increase'|'decrease'|'hold'|'increase_reps'|'none', message }
function getSuggestion(exName, day, category, targetRepsStr) {
  const isLower = day.toLowerCase().includes("lower");
  const incAmt = isLower ? 10 : 5;
  const sessions = getExerciseSessions(exName, 3);

  if (!sessions.length) {
    const prWeight = sheetsHistory[exName.toLowerCase()];
    if (prWeight) return { weight: prWeight, action: "none", message: `${prWeight}lbs — last known weight from Sheets. Log a full session to get a tailored recommendation.` };
    return null;
  }

  const range = parseRepRange(targetRepsStr);
  const latest = sessions[0];
  const weights = latest.sets.map(s => parseFloat(s.weight));
  const reps    = latest.sets.map(s => parseFloat(s.reps));
  const maxW = Math.max(...weights), minW = Math.min(...weights);
  const weightConsistent = (maxW - minW) < 0.01;
  const primaryWeight = weightConsistent ? weights[0] : median(weights);

  if (!weightConsistent) {
    return {
      weight: primaryWeight, action: "hold",
      message: `Sets varied last session (${weights.join('/')}${weights.length?'lbs':''}) — hold at ${primaryWeight}lbs and get every set consistent before progressing.`
    };
  }

  if (!range) {
    return { weight: primaryWeight, action: "hold", message: `Maintain ${primaryWeight}lbs — rep target isn't a standard range, so trend can't be scored automatically.` };
  }

  const anyBelowFloor = reps.some(r => r < range.floor);
  if (anyBelowFloor) {
    const newWeight = Math.max(primaryWeight - incAmt, 0);
    return {
      weight: newWeight, action: "decrease",
      message: `Reps dropped below your ${range.floor}-rep floor last session — reduce to ${newWeight}lbs to rebuild the full rep range before adding load back.`
    };
  }

  const allHitCeiling = reps.every(r => r >= range.ceiling);
  if (allHitCeiling) {
    // Leaky-bucket tolerance: minor misses chip away at a small buffer instead of
    // instantly breaking an otherwise solid multi-session trend. A fully clean
    // session drains the buffer back to zero.
    const TOLERANCE_CAP = 5;
    let confirmCount = 1; // latest session already confirmed clean above
    let poolUsed = 0;

    for (let i = 1; i < sessions.length; i++) {
      const s = sessions[i];
      const w = s.sets.map(x => parseFloat(x.weight));
      const r = s.sets.map(x => parseFloat(x.reps));
      const wConsistent = (Math.max(...w) - Math.min(...w)) < 0.01;
      const sessionClean = wConsistent && r.every(x => x >= range.ceiling);

      if (sessionClean) {
        poolUsed = 0; // clean session drains the buffer
        confirmCount++;
        continue;
      }

      let cost = 0;
      if (!wConsistent) {
        const drop = Math.max(...w) - Math.min(...w);
        cost = weightDropCredit(drop, category);
      } else if (hasConsecutiveShortfall(r, range.ceiling)) {
        cost = 1;
      }
      // Ambiguous/minor misses (not a consistent 2-3 rep shortfall, not a
      // qualifying weight drop) cost nothing and don't break the trend.

      poolUsed += cost;
      if (poolUsed >= TOLERANCE_CAP) break; // trend genuinely broken
      confirmCount++; // tolerated miss — keep counting the streak
    }

    const needed = sessions.length >= 2 ? 2 : 1;
    if (confirmCount >= needed) {
      const weightProgression = category === "Primary Compound" || category === "Secondary Compound";
      if (weightProgression) {
        const newWeight = primaryWeight + incAmt;
        return {
          weight: newWeight, action: "increase",
          message: `Hit ${range.ceiling}+ reps across all sets for ${confirmCount} straight session${confirmCount>1?'s':''} — progressive overload supports adding load now. Move to ${newWeight}lbs.`
        };
      } else {
        return {
          weight: primaryWeight, action: "increase_reps",
          message: `Maxed the ${range.ceiling}-rep target across all sets for ${confirmCount} straight session${confirmCount>1?'s':''}. For isolation work, research favors extending reps before adding weight — same hypertrophy stimulus, less joint strain. Hold ${primaryWeight}lbs and aim for ${range.ceiling+2}–${range.ceiling+4} reps.`
        };
      }
    } else {
      return {
        weight: primaryWeight, action: "hold",
        message: `Hit the top of your rep range last session — repeat at ${primaryWeight}lbs once more to confirm the trend before progressing.`
      };
    }
  }

  return {
    weight: primaryWeight, action: "hold",
    message: `Still building toward the top of your ${range.floor}–${range.ceiling} rep range — stay at ${primaryWeight}lbs until every set hits ${range.ceiling} reps.`
  };
}

function noUpperUnits(str) {
  return str.replace(/\blbs\b/gi,'<span class="no-upper">lbs</span>').replace(/\breps\b/gi,'<span class="no-upper">reps</span>');
}

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function switchView(v) {
  currentView=v;
  document.querySelectorAll(".nav-btn").forEach((b,i)=>{
    b.className="nav-btn "+(["workout","dashboard","history","export"][i]===v?"active":"inactive");
  });
  document.getElementById("day-tabs-wrap").style.display=v==="workout"?"block":"none";
  render();
}

function completedSets(day){return(sessionData[day]||[]).reduce((a,ex)=>a+ex.logged.filter(s=>s.done).length,0);}
function totalSets(day){return workoutPlan[day].exercises.reduce((a,ex)=>a+(ex.sets||0),0);}

function renderDayTabs() {
  const c=document.getElementById("day-tabs"); if(!c) return;
  c.innerHTML=DAYS.map(d=>{
    const comp=completedSets(d),tot=totalSets(d),pct=tot>0?Math.round(comp/tot*100):0,isAct=d===activeDay;
    return `<button class="day-tab ${isAct?'active':''}" onclick="selectDay('${d}')">
      <div class="day-tab-name">${d}</div>
      ${pct>0?`<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`:""}
    </button>`;
  }).join("");
}

function selectDay(day){activeDay=day;syncState=null;renderDayTabs();render();}

function render() {
  renderDayTabs();
  const main=document.getElementById("main");
  if(currentView==="workout")       main.innerHTML=renderWorkout();
  else if(currentView==="dashboard") main.innerHTML=renderDashboard();
  else if(currentView==="history")   main.innerHTML=renderHistory();
  else                               main.innerHTML=renderExport();
  document.getElementById("day-tabs-wrap").style.display=currentView==="workout"?"block":"none";
  const hBtn=document.getElementById("history-nav-btn");
  if(hBtn) hBtn.textContent=history.length>0?`History (${history.length})`:"History";
  if(currentView==="workout") bindDragEvents();
}

function renderWorkout() {
  const plan=workoutPlan[activeDay], data=sessionData[activeDay], names=exerciseNames[activeDay];

  </div>`;
  const currentDate=sessionDates[activeDay]||todayStr();

  plan.exercises.forEach((ex,exIdx)=>{

    } else {
      exData.logged.forEach((s,si)=>{
        const val=s.done
          ?`<span class="ex-set-val done-val">${s.weight||"—"}<span class="no-upper">lbs</span> × ${s.reps||"—"}<span class="no-upper">reps</span></span>`

        setRowsHtml+=`<div class="ex-set-row"><span class="ex-set-num">Set ${si+1}</span>${val}</div>`;
      });

    const sugArrow = sug ? (sug.action==="increase"?" ↑":sug.action==="decrease"?" ↓":sug.action==="increase_reps"?" →reps":"") : "";
    cards+=`<div class="ex-card ${allDone?'done':''}" data-idx="${exIdx}" onclick="openCard(${exIdx})" draggable="true">
      ${allDone?'<div class="ex-card-done-dot"></div>':""}
      <div class="ex-card-drag" data-idx="${exIdx}" onclick="event.stopPropagation()">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="ex-card-top-section">
        <div class="ex-card-name">${displayName}</div>
        <div class="ex-card-cat">${ex.category}</div>
        ${sug?`<div class="ex-card-rec">${sug.weight}<span class="no-upper">lbs</span>${sugArrow}</div>`:""}
      </div>
      <div class="ex-card-sets-list">${setRowsHtml}</div>
    </div>`;
  });
  cards+=`</div>`;
  return `<div style="padding:14px 12px">
    <div class="section-header"><div class="section-title">${activeDay}</div><div class="set-count">${comp}/${tot} sets</div></div>
    <div class="date-row"><span class="date-label">Date</span><input class="date-input" type="date" value="${currentDate}" onchange="updateSessionDate(this.value)"></div>
    ${sheetsHtml}${cards}
    <button class="add-exercise-btn" onclick="showAddExercise()">+ Add Exercise</button>
    <button class="save-session-btn" onclick="saveSession()">Save ${activeDay}</button>
    ${syncHtml}
  </div>`;
}

// ── Card modal ────────────────────────────────────────────────
let modalSwipeStartY=0, modalSwipeActive=false;

function extraFieldLabel(ex) {
  const text = ((ex.name||"")+" "+(ex.targetReps||"")+" "+(ex.category||"")).toLowerCase();
  if (text.includes("amrap")) return "AMRAP";
  if (text.includes("superset")) return "Phase 2";
  if (text.includes("drop set")||text.includes("dropset")) return "Drop";
  return null;
}

function openCard(exIdx) {
  const ex=workoutPlan[activeDay].exercises[exIdx];
  const exData=sessionData[activeDay][exIdx];
  const displayName=exerciseNames[activeDay][exIdx];
  const comment=comments[activeDay][exIdx]||"";
  const sug=getSuggestion(displayName,activeDay,ex.category,ex.targetReps);
  const recHtml=sug?`<div class="modal-rec" style="display:block;white-space:normal;line-height:1.4;">${noUpperUnits(sug.message)}</div>`:"";

  if(ex.isCardio){
    bodyHtml=`<div class="cardio-row"><span class="cardio-lbl">Speed 3.0 · 8–10% incline</span><input class="cardio-inp" inputmode="numeric" placeholder="Mins" value="${exData.logged[0].duration||""}" onchange="updateCardio(${exIdx},this.value)"></div>`;
  } else {
    bodyHtml=`<table class="sets-tbl"><thead><tr><th>#</th><th>Weight (<span class="no-upper">lbs</span>)</th><th><span class="no-upper">reps</span></th>${extraLabel?`<th>${extraLabel}</th>`:""}<th></th></tr></thead><tbody>`;
    exData.logged.forEach((s,setIdx)=>{
      bodyHtml+=`<tr class="${s.done?'done-row':''}">
        <td class="set-num-td">${setIdx+1}</td>
        <td class="set-inp-td"><input inputmode="decimal" type="text" pattern="[0-9]*\\.?[0-9]*" placeholder="###" value="${s.weight}" oninput="updateSetAuto(${exIdx},${setIdx},'weight',this.value)"></td>
        <td class="set-inp-td"><input inputmode="numeric" pattern="[0-9]*" placeholder="###" value="${s.reps}" oninput="updateSetAuto(${exIdx},${setIdx},'reps',this.value)"></td>
        ${extraLabel?`<td class="set-inp-td"><input inputmode="numeric" pattern="[0-9]*" placeholder="###" value="${s.extraReps||''}" oninput="updateExtraReps(${exIdx},${setIdx},this.value)"></td>`:""}
        <td class="chk-td"><button class="chk-btn ${s.done?'checked':''}" onclick="toggleDoneModal(${exIdx},${setIdx})">&#10003;</button></td>
      </tr>`;
    });
    bodyHtml+=`</tbody></table>`;
  }
  document.getElementById("modal-container").innerHTML=`
    <div class="modal-overlay" id="card-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" id="card-modal-box">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;">
          <div style="flex:1"><div class="modal-title">${displayName}</div><div class="modal-subtitle">${ex.category} · ${ex.targetReps} · ${ex.rest} rest</div></div>
          <div style="display:flex;gap:6px;flex-shrink:0;margin-left:10px;">
            <button onclick="showRenameCard(${exIdx})" style="background:var(--black4);border:1px solid #2A2000;color:var(--pearl-muted);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;touch-action:manipulation;">&#9998;</button>
            <button onclick="showDeleteSet(${exIdx})" style="background:var(--black4);border:1px solid #2A2000;color:var(--pearl-muted);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;touch-action:manipulation;">&#8722; Set</button>
            <button onclick="deleteExercise(${exIdx})" style="background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;touch-action:manipulation;">&#128465;</button>
          </div>
        </div>
        ${recHtml}${bodyHtml}
        <div id="ai-insight-box"></div>
        ${notesForInsight.length ? `<button class="modal-btn-cancel" style="width:100%;margin-top:10px;margin-bottom:4px;" onclick="runAINotesInsight(${exIdx})">Get Trainer Insight From Notes</button>` : ""}

        <textarea class="notes-inp" placeholder="Add notes..." onchange="updateComment(${exIdx},this.value)">${comment.replace(/"/g,'&quot;')}</textarea>
        <div class="modal-btns"><button class="modal-btn-cancel" onclick="closeModal()">Close</button></div>
      </div>

}

function updateExtraReps(exIdx,setIdx,value){
  sessionData[activeDay][exIdx].logged[setIdx].extraReps=value;
  persist();
}

// Pull up to maxSessions of past notes/comments for this exercise (non-empty only)
function getExerciseNotesHistory(exName, maxSessions) {
  maxSessions = maxSessions || 3;
  const out = [];
  for (const h of history) {
    const ex = h.exercises.find(e => e.name.toLowerCase() === exName.toLowerCase());
    if (ex && ex.comment && ex.comment.trim()) out.push({ date: h.date||h.sheetTab, comment: ex.comment.trim() });
    if (out.length >= maxSessions) break;
  }
  return out;
}

async function runAINotesInsight(exIdx) {
  const ex=workoutPlan[activeDay].exercises[exIdx];
  const displayName=exerciseNames[activeDay][exIdx];
  const notes=getExerciseNotesHistory(displayName,3);
  const sessions=getExerciseSessions(displayName,3);
  const box=document.getElementById("ai-insight-box");
  if(box) box.innerHTML=`<div class="modal-rec" style="display:block;">Reviewing your notes...</div>`;

  const historyText=sessions.map(s=>`${s.date}: `+s.sets.map(x=>`${x.weight}lbs×${x.reps}reps`).join(", ")).join(" | ")||"no set history logged";
  const notesText=notes.map(n=>`${n.date}: "${n.comment}"`).join(" | ")||"no notes logged";
  const prompt=`You are an experienced personal trainer reviewing a client's log for ${displayName} (${ex.category}).
Recent sets: ${historyText}
Recent notes: ${notesText}
In 2-3 short sentences: interpret what the notes imply about readiness to progress (fatigue, ease, pain, form issues) combined with the actual numbers, then give one concrete, evidence-based coaching cue specific to this exercise. Be direct, no preamble, no headers.`;

  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:250,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const text=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join(" ").trim();
    if(box) box.innerHTML=text?`<div class="modal-rec" style="display:block;">${noUpperUnits(text)}</div>`:`<div class="modal-rec" style="display:block;">Couldn't generate insight — try again.</div>`;
  } catch(e) {
    if(box) box.innerHTML=`<div class="modal-rec" style="display:block;">Unreachable — check connection.</div>`;
  }
}

function updateSetAuto(exIdx,setIdx,field,value) {
  const s=sessionData[activeDay][exIdx].logged[setIdx];
  s[field]=value;
  const w=(s.weight||"").toString().trim(), r=(s.reps||"").toString().trim();
  s.done=!!(w&&r);
  persist();
  const row=document.querySelector(`.sets-tbl tbody tr:nth-child(${setIdx+1})`);
  if(row){
    row.className=s.done?"done-row":"";
    const chk=row.querySelector(".chk-btn"); if(chk) chk.className="chk-btn"+(s.done?" checked":"");
    const inp=row.querySelectorAll(".set-inp-td input");
    if(inp[0]) inp[0].style.background=s.done?"var(--gold-bg)":"";
    if(inp[1]) inp[1].style.background=s.done?"var(--gold-bg)":"";
  }
  renderDayTabs();
}

function toggleDoneModal(exIdx,setIdx){
  sessionData[activeDay][exIdx].logged[setIdx].done=!sessionData[activeDay][exIdx].logged[setIdx].done;
  persist(); openCard(exIdx); renderDayTabs();
}

        <div class="modal-handle"></div>

function buildSuggestionList(query, isLower, targetCat, existingNames) {
  const dayType=isLower?"lower":"upper";
  const suggestions=getExerciseSuggestions(dayType, query, targetCat, existingNames);

  // Merge sheetsExerciseNames + learned customExercises not already in DB
  const dbNames=new Set(EXERCISE_DB.map(e=>e.name.toLowerCase()));
  const customMatchingDay=customExercises.filter(c=>{
    const nl=c.name.toLowerCase();
    if(dbNames.has(nl)) return false;
    if((existingNames||[]).map(x=>x.toLowerCase()).includes(nl)) return false;
    if(c.day && c.day!=="both" && c.day!==dayType) return false;
    if(query&&query.trim().length>1&&fuzzyScore(query,c.name)<15) return false;
    return true;
  });
  const customNames=new Set(customMatchingDay.map(c=>c.name.toLowerCase()));
  const sheetsOnly=sheetsExerciseNames.filter(n=>{
    const nl=n.toLowerCase();
    if(dbNames.has(nl)||customNames.has(nl)) return false;
    if((existingNames||[]).map(x=>x.toLowerCase()).includes(nl)) return false;
    if(query&&query.trim().length>1&&fuzzyScore(query,n)<15) return false;
    return true;
  });

  // Limit to top 8 from DB (incl. custom) + top 4 from Sheets history
  const topDB=[...suggestions, ...customMatchingDay.map(c=>({name:c.name,cat:c.cat||"Isolation",muscle:c.muscle,score:fuzzyScore(query,c.name)}))].slice(0,8);
  const topSheets=sheetsOnly.slice(0,4);

  // Hide the list entirely once the person is clearly typing a custom name with no match
  if(!topDB.length && !topSheets.length) {
    return query && query.trim().length>1 ? "" : `<div style="padding:14px;font-size:13px;color:var(--pearl-muted);">No exercises yet — type a name above.</div>`;
  }

  // Group DB suggestions by category
  const byCat={};
  topDB.forEach(e=>{if(!byCat[e.cat])byCat[e.cat]=[];byCat[e.cat].push(e);});
  const catOrder=["Primary Compound","Secondary Compound","Isolation","Cardio Finisher","Other"];

  let html="";
  catOrder.forEach(cat=>{
    if(!byCat[cat]||!byCat[cat].length) return;
    html+=`<div class="ex-suggest-section">${cat}</div>`;
    byCat[cat].forEach(e=>{
      const pr=sheetsHistory[e.name.toLowerCase()]||getLastWeight(e.name);
      const prStr=pr?`<span class="ex-suggest-pr">${pr}<span class="no-upper">lbs</span> PR</span>`:"";
      const isFuzzy=query&&query.trim().length>1&&e.score>10;
      html+=`<div class="ex-suggest-item ${isFuzzy?'fuzzy-match':''}" onclick="commitExerciseModal('${e.name.replace(/'/g,"\\'")}')">
        <span>${e.name}${e.muscle?` <span style="font-size:10px;color:var(--pearl-muted);">(${e.muscle})</span>`:""}</span>
        ${prStr}
      </div>`;
    });
  });

  if(topSheets.length){
    html+=`<div class="ex-suggest-section">From Your History</div>`;
    topSheets.forEach(n=>{
      const pr=sheetsHistory[n.toLowerCase()]||getLastWeight(n);
      const prStr=pr?`<span class="ex-suggest-pr">${pr}<span class="no-upper">lbs</span> PR</span>`:"";
      html+=`<div class="ex-suggest-item" onclick="commitExerciseModal('${n.replace(/'/g,"\\'")}')">
        <span>${n}</span>${prStr}
      </div>`;
    });
  }

  return html;
}

function commitExerciseModal(name) {
  name=name.trim();
  if(!name){showToast("Enter a name");return;}

  // Look up or infer category, reps, rest from DB, then learned custom exercises
  const dbEntry=DB_BY_NAME[name.toLowerCase()];
  const customEntry=customExercises.find(c=>c.name.toLowerCase()===name.toLowerCase());
  const cat    = dbEntry ? dbEntry.cat  : customEntry ? customEntry.cat : inferCategory(name);
  const reps   = dbEntry ? dbEntry.reps : inferTargetReps(name, cat);
  const rest   = dbEntry ? dbEntry.rest : inferRest(name, cat);
  const isCardio = cat==="Cardio Finisher";
  const isLower=activeDay.toLowerCase().includes("lower");

  if(_exModalMode==="add"){
    workoutPlan[activeDay].exercises.push({name, category:cat, sets:isCardio?null:3, targetReps:reps, rest, ...(isCardio?{isCardio:true}:{})});
    sessionData[activeDay].push(isCardio?{logged:[{duration:""}]}:{logged:Array.from({length:3},()=>({weight:"",reps:"",done:false}))});
    exerciseNames[activeDay].push(name);
    comments[activeDay].push("");
    document.body.style.position=""; document.body.style.width="";
    closeModal(); persist(); render();
    showToast(`${name} added`);
  } else {
    // Rename — also update the plan exercise category/reps/rest if DB knows it
    exerciseNames[activeDay][_exModalIdx]=name;
    if(dbEntry){
      workoutPlan[activeDay].exercises[_exModalIdx].category=cat;
      workoutPlan[activeDay].exercises[_exModalIdx].targetReps=reps;
      workoutPlan[activeDay].exercises[_exModalIdx].rest=rest;
    }
    document.body.style.position=""; document.body.style.width="";
    persist(); closeModal();
    showToast(`Renamed to ${name}`);
  }

  // Learn genuinely new custom exercises — save to Sheets so they're available everywhere
  if(!dbEntry && !customEntry){
    customExercises.push({name, cat, muscle:"Unknown", day:isLower?"lower":"upper"});
    saveCustomExerciseToSheets(name, cat, "Unknown", isLower?"lower":"upper");
  }
}

function bindModalSwipe(boxId) {

    modalSwipeStartY=e.touches[0].clientY; modalSwipeActive=true; box.style.transition="none";
  },{passive:true});
  box.addEventListener("touchmove",e=>{
    if(!modalSwipeActive) return;
    const dy=e.touches[0].clientY-modalSwipeStartY;
    if(dy>0) box.style.transform=`translateY(${dy}px)`;
  },{passive:true});

    if(!modalSwipeActive) return;

    box.style.transition="transform .25s ease";
    if(dy>100){box.style.transform="translateY(100%)";setTimeout(()=>closeModal(),220);}

// ── Drag & Drop ───────────────────────────────────────────────
function bindDragEvents(){
  document.querySelectorAll(".ex-card[data-idx]").forEach(card=>{
    const idx=parseInt(card.dataset.idx);
    card.addEventListener("dragstart",e=>{dragSrcIdx=idx;setTimeout(()=>card.classList.add("dragging"),0);e.stopPropagation();});
    card.addEventListener("dragend",()=>{card.classList.remove("dragging");document.querySelectorAll(".ex-card").forEach(c=>c.classList.remove("drag-over"));dragSrcIdx=null;dragOverIdx=null;});
    card.addEventListener("dragover",e=>{e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;document.querySelectorAll(".ex-card").forEach(c=>c.classList.remove("drag-over"));card.classList.add("drag-over");dragOverIdx=idx;});
    card.addEventListener("drop",e=>{e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;reorderExercise(dragSrcIdx,idx);});
  });
  document.querySelectorAll(".ex-card-drag[data-idx]").forEach(handle=>{
    handle.addEventListener("touchstart",e=>{
      const idx=parseInt(handle.dataset.idx);touchDragIdx=idx;touchStartY=e.touches[0].clientY;touchStartX=e.touches[0].clientX;
      const card=document.querySelector(`.ex-card[data-idx="${idx}"]`);if(!card)return;
      const rect=card.getBoundingClientRect();
      touchClone=card.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;opacity:.8;z-index:200;pointer-events:none;border:2px solid rgba(0,0,0,.5);border-radius:14px;transition:none;`;
      document.body.appendChild(touchClone);card.style.opacity=".25";
      e.preventDefault();e.stopPropagation();
    },{passive:false});
  });
  document.addEventListener("touchmove",onTouchMove,{passive:false});
  document.addEventListener("touchend",onTouchEnd);
}
function onTouchMove(e){
  if(touchDragIdx===null||!touchClone)return;e.preventDefault();
  const touch=e.touches[0],dx=touch.clientX-touchStartX,dy=touch.clientY-touchStartY;
  const card=document.querySelector(`.ex-card[data-idx="${touchDragIdx}"]`);
  if(card){const rect=card.getBoundingClientRect();touchClone.style.left=(rect.left+dx)+"px";touchClone.style.top=(rect.top+dy)+"px";}
  document.querySelectorAll(".ex-card").forEach(c=>c.classList.remove("drag-over"));
  document.querySelectorAll(".ex-card[data-idx]").forEach(c=>{
    const r=c.getBoundingClientRect();
    if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){const oi=parseInt(c.dataset.idx);if(oi!==touchDragIdx){c.classList.add("drag-over");dragOverIdx=oi;}}
  });
}
function onTouchEnd(){
  if(touchDragIdx===null)return;
  if(touchClone){touchClone.remove();touchClone=null;}
  const orig=document.querySelector(`.ex-card[data-idx="${touchDragIdx}"]`);if(orig)orig.style.opacity="";
  document.querySelectorAll(".ex-card").forEach(c=>c.classList.remove("drag-over"));
  if(dragOverIdx!==null&&dragOverIdx!==touchDragIdx)reorderExercise(touchDragIdx,dragOverIdx);
  touchDragIdx=null;dragOverIdx=null;
}
function reorderExercise(fromIdx,toIdx){
  const mv=arr=>{const item=arr.splice(fromIdx,1)[0];arr.splice(toIdx,0,item);};
  mv(workoutPlan[activeDay].exercises);mv(sessionData[activeDay]);mv(exerciseNames[activeDay]);mv(comments[activeDay]);
  persist();render();
}

function renderDashboard(){
  if(!history.length) return `<div style="padding:14px 12px"><div class="section-title" style="margin-bottom:16px">Dashboard</div><div class="empty-state"><div class="empty-icon">📊</div>Save a session to see your dashboard.</div></div>`;

  const now=new Date();
  const year=dashViewYear, month=dashViewMonth;
  const firstDay=new Date(year,month,1);
  const startOffset=firstDay.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=new Date(year,month,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const isCurrentMonth=(year===now.getFullYear()&&month===now.getMonth());

  const byDate={};
  history.forEach(h=>{const key=h.sheetTab||h.date;if(!byDate[key])byDate[key]=[];byDate[key].push(h);});

  // Calendar with nav
  let calHtml=`<div class="cal-nav">
    <button class="cal-nav-btn" onclick="dashNav(-1)">&#8592;</button>
    <span class="cal-nav-label">${monthName}</span>
    <button class="cal-nav-btn" onclick="dashNav(1)" ${isCurrentMonth?"disabled style='opacity:.3;cursor:default;'":""}>&#8594;</button>
  </div><div class="cal-grid">`;
  ["S","M","T","W","T","F","S"].forEach(d=>calHtml+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startOffset;i++) calHtml+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dateKey=new Date(year,month,day).toISOString().split("T")[0];
    const has=!!byDate[dateKey],sel=dashSelectedDate===dateKey;
    calHtml+=`<div class="cal-cell ${has?'has-session':''} ${sel?'selected':''}" ${has?`onclick="openDashDay('${dateKey}')"`:""}>${day}</div>`;
  }
  calHtml+=`</div>`;

  // Stats (always from full history, not just viewed month)
  let streak=0; let cursor=new Date();
  for(let i=0;i<60;i++){const key=cursor.toISOString().split("T")[0];if(byDate[key]){streak++;cursor.setDate(cursor.getDate()-1);}else break;}
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());
  let thisWeekCount=0;
  Object.keys(byDate).forEach(k=>{const d=new Date(k+"T12:00:00");if(d>=weekStart)thisWeekCount+=byDate[k].length;});
  let lastVolume=0;
  if(history.length>0)history[0].exercises.forEach(ex=>ex.sets.forEach(s=>{if(s.done&&s.weight&&s.reps){const w=parseFloat(s.weight),r=parseFloat(s.reps);if(!isNaN(w)&&!isNaN(r))lastVolume+=w*r;}}));

  // PR map — Sheets history as base, local history layered on top
  const prMap={};
  Object.entries(sheetsHistory).forEach(([name,w])=>{
    if(!prMap[name])prMap[name]={weight:w,reps:"—",cat:"Other",history:[]};
    else if(w>prMap[name].weight)prMap[name].weight=w;
  });
  history.forEach(h=>h.exercises.forEach(ex=>{
    let cat="Other";
    for(const d of Object.keys(workoutPlan)){const found=workoutPlan[d].exercises.find(e=>e.name.toLowerCase()===ex.name.toLowerCase());if(found){cat=found.category;break;}}
    // Also check DB
    const dbE=DB_BY_NAME[ex.name.toLowerCase()];
    if(dbE) cat=dbE.cat;
    ex.sets.forEach(s=>{
      if(s.done&&s.weight){
        const w=parseFloat(s.weight),key=ex.name.toLowerCase();
        if(isNaN(w))return;
        if(!prMap[key])prMap[key]={weight:w,reps:s.reps||"—",cat,history:[]};
        else{if(w>prMap[key].weight){prMap[key].weight=w;prMap[key].reps=s.reps||"—";}if(!prMap[key].cat||prMap[key].cat==="Other")prMap[key].cat=cat;}
        prMap[key].history=prMap[key].history||[];
        prMap[key].history.push({date:h.date||h.sheetTab,weight:w,reps:s.reps||"—"});
      }
    });
  }));

  const compoundCats=["Primary Compound","Secondary Compound"];
  const allPRs=Object.entries(prMap).filter(([,p])=>p.weight>0);
  const compoundPRs=allPRs.filter(([,p])=>compoundCats.includes(p.cat)).sort((a,b)=>b[1].weight-a[1].weight);
  const isolationPRs=allPRs.filter(([,p])=>!compoundCats.includes(p.cat)&&p.cat!=="Cardio Finisher").sort((a,b)=>b[1].weight-a[1].weight);

  function buildPRAccordions(entries){
    if(!entries.length)return`<div style="font-size:12px;color:var(--pearl-muted);">No data yet.</div>`;
    return entries.map(([name,pr])=>{
      const displayName=sheetsExerciseNames.find(n=>n.toLowerCase()===name)||name;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1A1A1D;">
        <span style="font-size:13px;font-weight:700;color:var(--pearl);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px;">${displayName}</span>
        <span style="font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;">${pr.weight}<span class="no-upper">lbs</span> × ${pr.reps}<span class="no-upper">reps</span></span>
      </div>`;
    }).join("");
  }

  // Volume trend SVG
  const volData=history.slice(0,8).reverse().map(h=>{let vol=0;h.exercises.forEach(ex=>ex.sets.forEach(s=>{if(s.done&&s.weight&&s.reps){const w=parseFloat(s.weight),r=parseFloat(s.reps);if(!isNaN(w)&&!isNaN(r))vol+=w*r;}}));return{label:h.day?h.day.replace(" ",""):"?",vol};});
  const maxVol=Math.max(...volData.map(d=>d.vol),1);
  const svgW=300,svgH=100,pad=20;
  const pts=volData.map((d,i)=>{const x=pad+(i/Math.max(volData.length-1,1))*(svgW-pad*2),y=svgH-pad-(d.vol/maxVol)*(svgH-pad*2);return`${x},${y}`;});
  const volSvg=volData.length<2?`<div style="font-size:12px;color:var(--pearl-muted);">Need 2+ sessions for trend.</div>`:`
    <svg viewBox="0 0 ${svgW} ${svgH}" class="vol-chart" preserveAspectRatio="none">
      <polyline points="${pts.join(' ')}" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${volData.map((d,i)=>{const[x,y]=pts[i].split(",");return`<circle cx="${x}" cy="${y}" r="4" fill="#C9A84C"/><text x="${x}" y="${svgH-2}" text-anchor="middle" font-size="9" fill="#8A6A28" font-family="Barlow,sans-serif">${d.label}</text>`;}).join("")}
    </svg>`;

  // Muscle group donut
  const muscleMap={Chest:0,Back:0,Shoulders:0,Arms:0,Legs:0};
  history.forEach(h=>{
    const isLower=(h.day||"").toLowerCase().includes("lower");
    h.exercises.forEach(ex=>{
      const done=ex.sets.filter(s=>s.done).length; if(!done)return;
      const dbE=DB_BY_NAME[ex.name.toLowerCase()];
      if(dbE){
        const m=dbE.muscle;
        if(m==="Chest")muscleMap.Chest+=done;
        else if(m==="Back")muscleMap.Back+=done;
        else if(m==="Shoulders")muscleMap.Shoulders+=done;
        else if(m==="Biceps"||m==="Triceps")muscleMap.Arms+=done;
        else if(["Quads","Hamstrings","Glutes","Calves"].includes(m))muscleMap.Legs+=done;
        return;
      }
      if(isLower){muscleMap.Legs+=done;return;}
      const n=ex.name.toLowerCase();
      if(n.includes("chest")||n.includes("fly")||n.includes("bench"))muscleMap.Chest+=done;
      else if(n.includes("row")||n.includes("pull")||n.includes("lat"))muscleMap.Back+=done;
      else if(n.includes("shoulder")||n.includes("lateral")||n.includes("delt"))muscleMap.Shoulders+=done;
      else if(n.includes("curl")||n.includes("tricep")||n.includes("hammer"))muscleMap.Arms+=done;
      else muscleMap.Back+=done;
    });
  });
  const muscleColors={Chest:"#C9A84C",Back:"#8A6A28",Shoulders:"#E2C47A",Arms:"#F0EDE6",Legs:"#4ADE80"};
  const muscleTotal=Object.values(muscleMap).reduce((a,b)=>a+b,0)||1;
  let donutAngle=-90;
  const donutR=36,donutCx=48,donutCy=48,stroke=20,circ=2*Math.PI*donutR;
  let donutSegs=Object.entries(muscleMap).filter(([,v])=>v>0).map(([muscle,val])=>{
    const pct=val/muscleTotal,dash=pct*circ,gap=circ-dash,rot=donutAngle;
    donutAngle+=pct*360;
    return `<circle cx="${donutCx}" cy="${donutCy}" r="${donutR}" fill="none" stroke="${muscleColors[muscle]}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" transform="rotate(${rot} ${donutCx} ${donutCy})" stroke-linecap="butt"/>`;
  }).join("");
  const donutSvg=`<svg viewBox="0 0 96 96" width="96" height="96" style="flex-shrink:0;"><circle cx="${donutCx}" cy="${donutCy}" r="${donutR}" fill="none" stroke="#1A1A1D" stroke-width="${stroke}"/>${donutSegs}</svg>`;
  const legendHtml=Object.entries(muscleMap).filter(([,v])=>v>0).map(([m,v])=>`<div class="donut-legend-row"><div class="donut-swatch" style="background:${muscleColors[m]};"></div><span>${m}</span><span style="margin-left:auto;font-weight:700;color:var(--pearl);">${Math.round(v/muscleTotal*100)}%</span></div>`).join("");

  // Sets per exercise bar chart (last 7 days)
  const sevenAgo=new Date(now);sevenAgo.setDate(now.getDate()-7);
  const exCounts={};
  history.forEach(h=>{const d=new Date((h.sheetTab||todayStr())+"T12:00:00");if(d<sevenAgo)return;h.exercises.forEach(ex=>{const done=ex.sets.filter(s=>s.done||s.duration).length;if(done>0)exCounts[ex.name]=(exCounts[ex.name]||0)+done;});});
  const topEx=Object.entries(exCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxEx=topEx.length?topEx[0][1]:1;
  const barChartHtml=topEx.length?topEx.map(([name,count])=>`<div class="bar-chart-row"><span class="bar-label">${name}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxEx*100)}%"></div></div><span class="bar-val">${count}</span></div>`).join(""):`<div style="font-size:12px;color:var(--pearl-muted);">No sets in last 7 days.</div>`;

  return `<div style="padding:14px 12px">
    <div class="section-title" style="margin-bottom:16px">Dashboard</div>
    <div class="dash-card"><div class="dash-card-title">Calendar</div>${calHtml}<div style="font-size:12px;color:var(--pearl-muted);text-align:center;margin-top:8px;">Tap a highlighted day to see that session.</div></div>
    <div class="dash-card"><div class="stat-grid">
      <div class="stat-box"><div class="stat-label">This week</div><div class="stat-value">${thisWeekCount} / ${DAYS.length}</div></div>
      <div class="stat-box"><div class="stat-label">Streak</div><div class="stat-value">${streak} day${streak===1?'':'s'}</div></div>
      <div class="stat-box"><div class="stat-label">Sessions</div><div class="stat-value">${history.length}</div></div>
      <div class="stat-box"><div class="stat-label">Last vol.</div><div class="stat-value">${lastVolume>0?Math.round(lastVolume).toLocaleString():'—'}</div></div>
    </div></div>
    <div class="dash-card"><div class="dash-card-title">Volume Trend</div><div style="font-size:11px;color:var(--pearl-muted);margin-bottom:8px;">Last ${volData.length} sessions · total volume</div>${volSvg}</div>
    <div class="dash-card"><div class="dash-card-title">Muscle Group Split</div><div class="donut-wrap">${donutSvg}<div class="donut-legend">${legendHtml||'<div style="font-size:12px;color:var(--pearl-muted);">No data yet.</div>'}</div></div></div>
    <div class="dash-card"><div class="dash-card-title">Personal Records — Compounds</div>${buildPRAccordions(compoundPRs)}</div>
    <div class="dash-card"><div class="dash-card-title">Personal Records — Isolation</div>${buildPRAccordions(isolationPRs)}</div>
    <div class="dash-card"><div class="dash-card-title">Sets Per Exercise — Last 7 Days</div>${barChartHtml}</div>
  </div>`;
}

function openDashDay(dateKey){
  dashSelectedDate=dateKey;
  const byDate={};history.forEach(h=>{const key=h.sheetTab||h.date;if(!byDate[key])byDate[key]=[];byDate[key].push(h);});
  const entries=byDate[dateKey]||[]; if(!entries.length)return;
  let bodyHtml="";
  entries.forEach(entry=>{
    const total=entry.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
    bodyHtml+=`<div style="margin-bottom:14px;"><div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:2px;">${fmtDate(entry.date)} — ${entry.day}</div><div style="font-size:12px;color:var(--pearl-muted);margin-bottom:10px;">${entry.exercises.length} exercises · ${total} sets · ${entry.synced?'synced':'local only'}</div>`;
    entry.exercises.forEach(ex=>{
      const done=ex.sets.filter(s=>s.done||s.duration); if(!done.length)return;
      bodyHtml+=`<div style="font-size:12px;color:var(--gold-dim);font-weight:700;margin-bottom:4px;">${ex.name}</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">`;
      done.forEach(s=>{
        if(s.done)bodyHtml+=`<span style="font-size:12px;padding:2px 8px;border-radius:5px;background:var(--black3);border:1px solid #3A3A3A;color:var(--pearl);font-weight:700;">${s.weight||'—'}<span class="no-upper">lbs</span> × ${s.reps||'—'}<span class="no-upper">reps</span></span>`;
        else if(s.duration)bodyHtml+=`<span style="font-size:12px;padding:2px 8px;border-radius:5px;background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);font-weight:700;">${s.duration} mins</span>`;
      });
      bodyHtml+=`</div>`;
    });
    bodyHtml+=`</div>`;
  });
  document.getElementById("modal-container").innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this){document.getElementById('modal-container').innerHTML='';dashSelectedDate=null;}">
      <div class="modal-box" id="dash-modal-box"><div class="modal-handle"></div>${bodyHtml}
        <button class="modal-btn-cancel" onclick="document.getElementById('modal-container').innerHTML='';dashSelectedDate=null;" style="width:100%;padding:14px;border-radius:10px;border:1px solid #2A2000;background:transparent;color:var(--pearl-muted);font-size:16px;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;margin-top:4px;">Close</button>
      </div>
    </div>`;
  bindModalSwipe("dash-modal-box");
}

// ── History ───────────────────────────────────────────────────
function renderHistory(){
  let html=`<div style="padding:14px 12px"><div class="section-title" style="margin-bottom:16px">Session History</div>`;
  if(!history.length){
    html+=`<div class="empty-state"><div class="empty-icon">📋</div>No sessions saved yet.</div>`;
  } else {
    history.forEach(entry=>{
      const total=entry.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
      html+=`<div class="hist-wrap"><div class="hist-head"><div><div class="hist-day">${entry.day}</div><div class="hist-date">${fmtDate(entry.date)}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;"><span class="hist-badge ${entry.synced?'synced':'local'}">${entry.synced?'Synced':'Local'}</span><span style="font-size:12px;color:var(--pearl-muted);">${total} sets</span></div></div>
        <div style="overflow-x:auto;"><table class="hist-tbl"><thead><tr><th>Exercise</th><th>Set 1</th><th>Set 2</th><th>Set 3</th><th>Notes</th></tr></thead><tbody>`;
      entry.exercises.forEach(ex=>{
        const hasDone=ex.sets.some(s=>s.done||s.duration); if(!hasDone)return;
        const fmt=s=>s&&s.done?`${s.weight||'—'}<span class="no-upper">lbs</span>×${s.reps||'—'}<span class="no-upper">reps</span>`:s&&s.duration?`${s.duration}m`:'—';
        html+=`<tr><td class="ex-name">${ex.name}</td><td class="set-val">${fmt(ex.sets[0])}</td><td class="set-val">${fmt(ex.sets[1])}</td><td class="set-val">${fmt(ex.sets[2])}</td><td class="note-val">${ex.comment||'—'}</td></tr>`;
      });
      html+=`</tbody></table></div></div>`;
    });
  }
  html+=`</div>`; return html;
}

// ── Export ────────────────────────────────────────────────────
function renderExport(){
  const synced=history.filter(h=>h.synced).length;
  return `<div style="padding:14px 12px">
    <div class="section-title" style="margin-bottom:6px;">Save & Export</div>
    <div style="font-size:14px;color:var(--pearl-muted);margin-bottom:20px;">Auto-saves locally and syncs on every session save.</div>
    <div class="export-card"><div class="export-card-title">Auto-Save Status</div><div class="status-ok">Local storage active</div><div class="status-sub">Sessions saved: ${history.length}</div><div class="sheets-badge">Synced: ${synced}</div></div>
    <div class="export-card"><div class="export-card-title">Reload Sheets History</div><div class="export-card-desc">Refresh suggested weights from Sheets.</div><button class="export-btn-p" onclick="fetchSheetsHistory()" style="width:100%">Reload from Sheets</button></div>
    <div class="export-card"><div class="export-card-title">Fix Sheet Categorization</div><div class="export-card-desc">Re-classifies every existing exercise row in your Google Sheet with the correct Category and Muscle column. Run once after deploying the updated Apps Script.</div><button class="export-btn-p" onclick="rewriteSheetsData()" style="width:100%;background:var(--gold-dim);">Rewrite &amp; Categorize Sheets</button><div id="rewrite-status" style="font-size:13px;margin-top:8px;"></div></div>
    <div class="export-card"><div class="export-card-title">Export History</div><div class="export-card-desc">Download your full workout log.</div><div class="export-btns"><button class="export-btn-p" onclick="exportCSV()">Export CSV</button><button class="export-btn-s" onclick="exportJSON()">Export JSON</button></div></div>
    <div class="export-card"><div class="export-card-title">Add to Home Screen</div><div class="export-card-desc" style="margin-bottom:0;"><strong style="color:var(--gold);">iPhone:</strong> Safari → Share → Add to Home Screen<br><strong style="color:var(--gold);">Android:</strong> Chrome → Menu → Add to Home Screen</div></div>
    <div class="danger-card"><div class="danger-title">Clear All History</div><div style="font-size:14px;color:var(--pearl-muted);">Clears local history. Sheets data unaffected.</div><button class="danger-btn" onclick="clearHistory()">Clear Local History</button></div>
  </div>`;
}

async function saveSession(){
  const plan=workoutPlan[activeDay],data=sessionData[activeDay],names=exerciseNames[activeDay],exComments=comments[activeDay];
  const chosenDate=sessionDates[activeDay]||todayStr();
  const dateObj=new Date(chosenDate+"T12:00:00");
  const timestamp=dateObj.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const entry={day:activeDay,date:timestamp,sheetTab:chosenDate,synced:false,
    exercises:plan.exercises.map((ex,i)=>({name:names[i],category:ex.category,sets:JSON.parse(JSON.stringify(data[i].logged)),comment:exComments[i]||""}))};
  history.unshift(entry);
  sessionData[activeDay]=initSetsForDay(activeDay);
  comments[activeDay]=initCommentsForDay(activeDay);
  sessionDates[activeDay]=todayStr();
  persist();syncState="syncing";render();
  try{
    const response=await fetch(APPS_SCRIPT_URL,{method:"POST",body:JSON.stringify(entry)});
    const result=await response.json();
    if(result.success){history[0].synced=true;persist();syncState="success";showToast(`${activeDay} saved and synced`);}
    else{syncState="error";syncMessage="Sheets sync failed";showToast(`${activeDay} saved locally`);}
  }catch(err){syncState="error";syncMessage="No internet";showToast(`${activeDay} saved locally`);}
  render();
}

function exportCSV(){
  const rows=[["Date","Day","Exercise","Category","Set","Weight (lbs)","Reps","Notes","Synced"]];
  history.forEach(entry=>{entry.exercises.forEach(ex=>{ex.sets.forEach((s,idx)=>{if(s.done)rows.push([entry.date,entry.day,ex.name,ex.category||"",idx+1,s.weight||"",s.reps||"",ex.comment||"",entry.synced?"Yes":"No"]);});});});
  downloadFile(rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n"),"workout-history.csv","text/csv");
  showToast("Exported as CSV");
}
function exportJSON(){downloadFile(JSON.stringify({exportedAt:new Date().toISOString(),history},null,2),"workout-history.json","application/json");showToast("Exported as JSON");}
function downloadFile(content,filename,type){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
function clearHistory(){if(!confirm("Clear local history? Sheets data is unaffected."))return;history=[];persist();showToast("History cleared");render();}

fetchSheetsHistory();
fetchSheetsSessions();
fetchCustomExercises();
render();
</script>
